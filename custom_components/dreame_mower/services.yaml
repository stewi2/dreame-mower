start_zone_mowing:
  name: Start zone mowing
  description: Start mowing for one or more explicit zone IDs.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    zone_ids:
      name: Zone IDs
      description: List of zone IDs to mow, for example [1, 3].
      required: true
      example: [1, 3]

start_spot_mowing:
  name: Start spot mowing
  description: Start mowing for one or more explicit spot area IDs.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    spot_area_ids:
      name: Spot area IDs
      description: List of spot area IDs to mow, for example [2, 4].
      required: true
      example: [2, 4]
